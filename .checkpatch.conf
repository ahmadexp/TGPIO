# Default checkpatch options, read automatically from the tree root.
#
# These three types are ignored with cause, rather than contorting the code or
# breaking a target build. Everything else is enforced.
#
#   LINUX_VERSION_CODE, CONSTANT_COMPARISON
#       The v7.0-vs-v7.2 cross-timestamp compat shim. An out-of-tree module
#       spanning two API eras has to version-test, and the form
#       `LINUX_VERSION_CODE >= KERNEL_VERSION(...)` is the standard kernel
#       idiom (so the "constant on the right" hint is a false positive here).
#
#   ALLOC_WITH_SIZEOF
#       kzalloc_obj() does not exist on the 7.0 target; using it would break
#       that build. It is a rawhide-only suggestion.
--ignore LINUX_VERSION_CODE,CONSTANT_COMPARISON,ALLOC_WITH_SIZEOF
