# Local lint gate. One-time:  pre-commit install
# Run on everything:          pre-commit run --all-files
#
# This stage is the fast, kernel-headers-free part: formatting (.clang-format,
# clang-format owns C layout) plus whitespace hygiene. The kernel-specific
# analysers that need the build tree -- checkpatch, sparse, clang-tidy -- run in
# CI (.github/workflows/ci.yml), where the kernel headers are available.
minimum_pre_commit_version: "3.0.0"

repos:
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v19.1.7
    hooks:
      - id: clang-format
        files: ^src/.*\.(c|h)$
        # tgpio-trace.h is TRACE_EVENT macro DSL; excluded via .clang-format-ignore
        # too, but skip it here so the hook never rewrites it.
        exclude: ^src/tgpio-trace\.h$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-merge-conflict
